# Dynamic Configuration - Middlewares
http:
  middlewares:
    security-headers:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        frameDeny: true

    rate-limit-default:
      rateLimit:
        average: 100
        burst: 200
        period: 1m

    rate-limit-auth:
      rateLimit:
        average: 30
        burst: 50
        period: 1m
