# Dynamic Configuration - Routers & Services
# Routes traffic to K3s NodePort services and non-K3s services
# TLS via Cloudflare Origin Certificate (configured in tls.yml)

http:
  routers:
    # ─��� Traefik Dashboard ─────────────────────────────
    traefik-dashboard:
      rule: "Host(`traefik.lshworkspace.com`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
        - security-headers
        - rate-limit-strict
      tls: {}

    # ── K3s Services ───���──────────────────────────────

    # www → non-www redirect
    lshworkspace-www-redirect:
      rule: "Host(`www.lshworkspace.com`)"
      entryPoints:
        - websecure
      service: lshworkspace-blog
      middlewares:
        - www-redirect
      tls: {}

    # Main blog/portfolio
    lshworkspace-blog:
      rule: "Host(`lshworkspace.com`)"
      entryPoints:
        - websecure
      service: lshworkspace-blog
      middlewares:
        - security-headers
        - compress
        - rate-limit-default
      tls: {}
      priority: 1

    # OAuth Authorization Server
    lshworkspace-oauth:
      rule: "Host(`auth.lshworkspace.com`)"
      entryPoints:
        - websecure
      service: lshworkspace-oauth
      middlewares:
        - security-headers
        - oauth-cors
        - rate-limit-auth
      tls: {}

    # ── Monitoring ──────────────────────────���─────────
    grafana:
      rule: "Host(`grafana.lshworkspace.com`)"
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - security-headers
        - rate-limit-default
      tls: {}

    uptime-kuma:
      rule: "Host(`status.lshworkspace.com`)"
      entryPoints:
        - websecure
      service: uptime-kuma
      middlewares:
        - security-headers
      tls: {}

    # ── Non-K3s Services ──────────────────────────────
    pgadmin:
      rule: "Host(`pgadmin.lshworkspace.com`)"
      entryPoints:
        - websecure
      service: pgadmin
      middlewares:
        - security-headers
        - rate-limit-strict
        - dashboard-auth
      tls: {}

  services:
    lshworkspace-blog:
      loadBalancer:
        servers:
          # K3s NodePort (Performance server) → Nginx → Next.js
          - url: "http://168.107.56.184:30080"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    lshworkspace-oauth:
      loadBalancer:
        servers:
          # K3s NodePort (Performance server) → Spring OAuth
          - url: "http://168.107.56.184:30081"
        healthCheck:
          path: /actuator/health
          interval: 10s
          timeout: 3s

    grafana:
      loadBalancer:
        servers:
          - url: "http://168.107.56.184:30090"

    uptime-kuma:
      loadBalancer:
        servers:
          - url: "http://168.107.56.184:30091"

    pgadmin:
      loadBalancer:
        servers:
          # Local pgadmin on Proxy server
          - url: "http://127.0.0.1:5050"
